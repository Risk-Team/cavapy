<svg width="980" height="250" viewBox="0 0 980 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">cavapy logo</title>
  <desc id="desc">Scientific-style cavapy logo with data grid, contour lines, and analytical bars.</desc>

  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f3f9fc"/>
      <stop offset="100%" stop-color="#e5f2f8"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1d6f8c"/>
      <stop offset="100%" stop-color="#0f3f58"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2ca58d"/>
      <stop offset="100%" stop-color="#3a86b8"/>
    </linearGradient>
    <clipPath id="clipTile">
      <rect x="24" y="24" width="202" height="202" rx="40"/>
    </clipPath>
  </defs>

  <rect x="24" y="24" width="202" height="202" rx="40" fill="url(#panel)"/>

  <g clip-path="url(#clipTile)" opacity="0.45" stroke="#8fb7c9" stroke-width="1">
    <line x1="24" y1="58" x2="226" y2="58"/>
    <line x1="24" y1="92" x2="226" y2="92"/>
    <line x1="24" y1="126" x2="226" y2="126"/>
    <line x1="24" y1="160" x2="226" y2="160"/>
    <line x1="24" y1="194" x2="226" y2="194"/>

    <line x1="58" y1="24" x2="58" y2="226"/>
    <line x1="92" y1="24" x2="92" y2="226"/>
    <line x1="126" y1="24" x2="126" y2="226"/>
    <line x1="160" y1="24" x2="160" y2="226"/>
    <line x1="194" y1="24" x2="194" y2="226"/>
  </g>

  <circle cx="125" cy="125" r="70" fill="#ffffff" opacity="0.9"/>
  <path d="M168 74 A58 58 0 1 0 168 176" fill="none" stroke="url(#ring)" stroke-width="15" stroke-linecap="round"/>

  <path d="M79 98 C95 88, 114 88, 131 99" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M77 124 C96 113, 115 114, 134 125" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
  <path d="M81 149 C97 141, 113 142, 128 152" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <g>
    <rect x="138" y="146" width="7" height="16" rx="2" fill="#1f6f8b"/>
    <rect x="148" y="138" width="7" height="24" rx="2" fill="#1f6f8b"/>
    <rect x="158" y="129" width="7" height="33" rx="2" fill="#1f6f8b"/>
  </g>

  <text x="260" y="120" fill="#0b2239" font-family="'IBM Plex Sans', 'Avenir Next', 'Segoe UI', sans-serif" font-size="74" font-weight="700" letter-spacing="0.8">cavapy</text>
  <text x="262" y="161" fill="#355070" font-family="'IBM Plex Sans', 'Avenir Next', 'Segoe UI', sans-serif" font-size="23" font-weight="500" letter-spacing="0.6">Scientific climate data access for CAVA workflows</text>
</svg>
