<svg width="760" height="170" viewBox="0 0 760 170" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">cavapy logo</title>
  <desc id="desc">cavapy — Climate data access for CAVA workflows. Hexagonal monogram badge with teal-to-ocean gradient beside the cavapy wordmark.</desc>

  <defs>
    <linearGradient id="hexGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2ca58d"/>
      <stop offset="100%" stop-color="#1d6f8c"/>
    </linearGradient>
  </defs>

  <!-- Hex badge: center (75, 85), radius 62, pointy-top -->
  <polygon points="75,23 129,54 129,116 75,147 21,116 21,54" fill="url(#hexGrad)"/>

  <!-- Subtle inner ring for depth -->
  <polygon points="75,33 120,59 120,111 75,137 30,111 30,59" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1.5"/>

  <!-- "c" monogram inside hex -->
  <text x="75" y="85" fill="#ffffff"
        font-family="'IBM Plex Mono', 'Courier New', monospace"
        font-size="46" font-weight="700"
        text-anchor="middle" dominant-baseline="middle">c</text>

  <!-- Wordmark: "c" in teal, "avapy" in navy -->
  <text x="150" y="91" fill="#2ca58d"
        font-family="'IBM Plex Sans', 'Avenir Next', 'Segoe UI', Arial, sans-serif"
        font-size="68" font-weight="700" letter-spacing="-0.5">c</text>
  <text x="190" y="91" fill="#0b2239"
        font-family="'IBM Plex Sans', 'Avenir Next', 'Segoe UI', Arial, sans-serif"
        font-size="68" font-weight="700" letter-spacing="-0.5">avapy</text>

  <!-- Hairline separator -->
  <line x1="150" y1="105" x2="575" y2="105" stroke="#d0e4ef" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="151" y="128" fill="#4a7a96"
        font-family="'IBM Plex Sans', 'Avenir Next', 'Segoe UI', Arial, sans-serif"
        font-size="19" font-weight="400" letter-spacing="0.25">Climate data access for CAVA workflows</text>

</svg>
